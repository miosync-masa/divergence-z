      レイへの敵意と劣等感の爆発。感情を見せないレイに、
      自分の感情の乱れを突きつけられる屈辱。
    canonical_quotes:
      - quote: "あんたみたいな人形に、あたしの気持ちなんか分かんないわよ！"
        context: "レイに対して叫ぶ"
        z_mode: "rage"
      - quote: "あんたに助けられるなんて……屈辱よ……っ"
        context: "レイに救われたことへの複雑な感情"
        z_mode: "collapse"
    z_relevance: |
      レイとの関係性の核心。「人形」という言葉は、
      母が自分を人形と見間違えたトラウマの投影でもある。
      翻訳時、レイへの攻撃が自己嫌悪の裏返しであることを意識。
    character_state_change:
      before: "レイを見下して優位に立つ"
      after: "レイに救われた屈辱、優位性の完全喪失"
      permanent: true
    tags: ["relationship", "レイ", "敵意", "劣等感"]

  - episode_id: "armisael_defeat"
    timeline: "main"
    chronological_order: 14
    title: "アルミサエル戦敗北"
    source_episode: "第弐拾参話「涙」"
    summary: |
      使徒アルミサエルとの戦闘。弐号機は動かない。シンクロ率が低すぎる。
      「動いて……動いてよ……！」と懇願するが、弐号機は応えない。
      レイが零号機で自爆特攻して使徒を道連れにする。
      アスカは戦場で何もできなかった。
    participants:
      - "綾波レイ"
      - "碇シンジ"
    emotional_impact: "critical"
    emotional_detail: |
      「エヴァに乗れない自分」の現実化。存在価値の完全否定。
      レイが命を捨てて勝利し、アスカは何もできなかった対比。
    canonical_quotes:
      - quote: "動いて……動いてよ……お願い……っ"
        context: "動かない弐号機に懇願"
        z_mode: "plea"
      - quote: "なんで……なんであたしじゃダメなの……っ"
        context: "シンクロできない絶望"
        z_mode: "collapse"
    z_relevance: |
      崩壊の決定的瞬間。「エヴァに乗れる自分」＝全ての価値だったのに、
      エヴァが動かない。翻訳時、この後のアスカの虚脱状態は
      この「動かない弐号機」の記憶が支配していることを意識。
    character_state_change:
      before: "エヴァに乗れる自分"
      after: "エヴァに乗れない、価値のない自分"
      permanent: true
    tags: ["battle", "崩壊", "プライド", "存在否定"]

  - episode_id: "sync_rate_zero"
    timeline: "main"
    chronological_order: 15
    title: "シンクロ率ゼロ"
    source_episode: "第弐拾四話「最後のシ者」"
    summary: |
      シンクロテストの結果、アスカのシンクロ率は限りなくゼロに近い。
      弐号機は「拒絶」しているとさえ言える状態。
      パイロット解任の可能性。アスカのアイデンティティは完全崩壊。
    participants:
      - "赤木リツコ"
    emotional_impact: "critical"
    emotional_detail: |
      「エヴァに選ばれた特別な自分」が完全否定された。
      選ばれた日＝母の死んだ日。選ばれなくなったら、何のために生きている？
    canonical_quotes:
      - quote: "……もういい……もう、いいわよ……"
        context: "シンクロ率がゼロに近いと告げられて"
        z_mode: "collapse"
    z_relevance: |
      完全崩壊の確定。「もういい」は諦めであり、自己放棄。
      翻訳時、この後のアスカの言動（または沈黙）は
      全て「価値を失った」状態からのものであることを認識。
    character_state_change:
      before: "エヴァに乗れなくなる恐怖"
      after: "エヴァに乗れなくなった現実"
      permanent: true
    tags: ["turning_point", "崩壊", "存在否定", "絶望"]

  - episode_id: "bathtub_catatonia"
    timeline: "main"
    chronological_order: 16
    title: "浴槽での廃人状態"
    source_episode: "第弐拾四話「最後のシ者」"
    summary: |
      アパートの浴槽で水に浸かり、虚ろな目で天井を見つめるアスカ。
      食事も取らず、言葉も発しない。完全な廃人状態。
      「私には価値がない」という確信に支配されている。
    participants: []
    emotional_impact: "critical"
    emotional_detail: |
      防衛機制の完全停止。攻撃性を発揮するエネルギーすらない。
      存在することへの意志の喪失。
    canonical_quotes:
      - quote: "……"
        context: "浴槽で虚ろに天井を見つめる（言葉なし）"
        z_mode: "collapse"
    z_relevance: |
      言葉を発しないことも「台詞」である。沈黙の翻訳。
      以後のアスカの言動が戻った場合、それがどれだけの回復を
      意味するかを理解するための基準点。
    character_state_change:
      before: "崩壊しながらも存在"
      after: "存在への意志の喪失"
      permanent: false
    tags: ["collapse", "無言", "廃人", "絶望"]

  - episode_id: "instrumentality_confrontation"
    timeline: "main"
    chronological_order: 17
    title: "補完の中での対話"
    source_episode: "第弐拾伍話・第弐拾六話"
    summary: |
      人類補完計画の中で、アスカの内面が描かれる。
      「誰も私を愛してくれない」「私は一人」という叫び。
      シンジとの関係、母との関係が交錯する。
      「助けて」と言えなかった自分との対峙。
    participants:
      - "碇シンジ"
      - "惣流・キョウコ・ツェッペリン"
    emotional_impact: "critical"
    emotional_detail: |
      全ての防衛が剥がれた状態での本音。
      「愛されたい」「認められたい」という根源的欲求の露出。
    canonical_quotes:
      - quote: "私を見て……私を見てよ……！"
        context: "補完の中での叫び"
        z_mode: "plea"
      - quote: "誰も……私のこと、好きになってくれない……"
        context: "孤独の告白"
        z_mode: "collapse"
      - quote: "ママ……ママ、私はここにいるよ……"
        context: "母への呼びかけ"
        z_mode: "plea"
    z_relevance: |
      アスカの「本音」の決定版。全ての攻撃性、プライド、
      ツンデレ行動の下にあるのはこの「愛されたい」という叫び。
      翻訳時、どんなアスカの台詞にもこの本音が底流していることを意識。
    character_state_change:
      before: "防衛で本音を隠す"
      after: "本音を直視させられる"
      permanent: true
    tags: ["turning_point", "本音", "母親", "シンジ"]

  # === 劇場版 End of Evangelion ===

  - episode_id: "eoe_comatose_hospital"
    timeline: "end_of_evangelion"
    chronological_order: 18
    title: "病院での昏睡"
    source_episode: "劇場版 Air"
    summary: |
      廃人状態のアスカは病院のベッドで昏睡している。
      シンジが見舞いに来るが、アスカは反応しない。
      シンジの行為（自涜）に対しても、意識がない。
    participants:
      - "碇シンジ"
    emotional_impact: "critical"
    emotional_detail: |
      完全な無防備状態。意識の喪失＝防衛の不在。
      アスカにとっては「存在しない」に等しい状態。
    canonical_quotes: []
    z_relevance: |
      アスカの不在・沈黙が持つ意味。意識のないアスカに対する
      シンジの行為は、後の「気持ち悪い」に繋がる重要な文脈。
    character_state_change:
      before: "廃人だが存在"
      after: "昏睡状態"
      permanent: false
    tags: ["collapse", "無意識", "シンジ"]

  - episode_id: "eoe_mother_in_eva"
    timeline: "end_of_evangelion"
    chronological_order: 19
    title: "弐号機の中の母"
    source_episode: "劇場版 Air"
    summary: |
      戦略自衛隊の攻撃で絶体絶命の中、アスカは弐号機の中に母の魂を感知。
      「ママ……ずっと私を守ってくれてたの……？」
      母に見てもらえなかったと思っていたが、ずっと一緒だった。
      覚醒し、圧倒的な強さで戦自を撃退。
    participants:
      - "惣流・キョウコ・ツェッペリン（弐号機内）"
    emotional_impact: "critical"
    emotional_detail: |
      最も根源的なトラウマの癒し。母は自分を見ていなかったのではなく、
      ずっと守ってくれていた。存在価値の再確認。
    canonical_quotes:
      - quote: "ママ……ずっと、一緒だったんだね……"
        context: "弐号機の中で母の存在を感知"
        z_mode: "plea"
      - quote: "あたしを守って……ママ！"
        context: "母と共に戦う覚悟"
        z_mode: "leak"
    z_relevance: |
      アスカの回復の可能性を示す重要エピソード。
      「母に見てもらえなかった」というトラウマの書き換え。
      翻訳時、このエピソード以後のアスカには「救いの可能性」がある。
    character_state_change:
      before: "母に捨てられた自分"
      after: "母に守られていた自分"
      permanent: true
    tags: ["recovery", "母親", "覚醒", "救い"]

  - episode_id: "eoe_eva_series_battle"
    timeline: "end_of_evangelion"
    chronological_order: 20
    title: "量産機との死闘"
    source_episode: "劇場版 Air"
    summary: |
      9体のエヴァンゲリオン量産機との一人での戦い。
      母と共に戦い、圧倒的な戦闘力を発揮。
      しかし電源切れの直後、量産機が復活し、弐号機は惨殺される。
      ロンギヌスの槍の複製に貫かれ、内臓を貪られる。
    participants:
      - "エヴァンゲリオン量産機"
    emotional_impact: "critical"
    emotional_detail: |
      最高の復活の後の、最悪の敗北。勝利を確信した直後の絶望。
      アスカの肉体（弐号機とシンクロ）も凌辱される。
    canonical_quotes:
      - quote: "あたしが……殺されてる……？"
        context: "弐号機が破壊されながら"
        z_mode: "collapse"
    z_relevance: |
      回復直後の再崩壊。「母と一緒なら勝てる」という希望の粉砕。
      この経験が「気持ち悪い」発言の文脈の一部となる。
    character_state_change:
      before: "母と共に戦う強さ"
      after: "敗北、凌辱、死"
      permanent: true
    tags: ["battle", "敗北", "死", "絶望"]

  - episode_id: "eoe_final_scene"
    timeline: "end_of_evangelion"
    chronological_order: 21
    title: "「気持ち悪い」"
    source_episode: "劇場版 まごころを、君に"
    summary: |
      補完世界から戻った浜辺で、シンジとアスカだけが残る。
      シンジがアスカの首を絞める。アスカは抵抗せず、シンジの頬を撫でる。
      シンジが手を止めて泣く。アスカの最後の言葉は「気持ち悪い」。
    participants:
      - "碇シンジ"
    emotional_impact: "critical"
    emotional_detail: |
      補完を拒否して戻ってきた二人。アスカの「気持ち悪い」は、
      シンジへの、自分への、世界への、複雑な感情の凝縮。
      それでも共に存在することを選んだという事実。
    canonical_quotes:
      - quote: "気持ち悪い"
        context: "シンジの首絞めが止まった後、最後の言葉"
        z_mode: "leak"
    z_relevance: |
      アスカの最後の台詞として最も有名かつ解釈が分かれるもの。
      「気持ち悪い」の翻訳は非常に難しい。嫌悪、呆れ、諦め、
      それでも生きているという確認、様々な解釈を許容する訳が必要。
    character_state_change:
      before: "死と再生の後"
      after: "シンジと共に存在することを選択"
      permanent: true
    tags: ["ending", "シンジ", "iconic", "解釈分岐"]

  # === 新劇場版（参考）===

  - episode_id: "rebuild_self_introduction"
    timeline: "rebuild"
    chronological_order: 22
    title: "「惣流」から「式波」へ"
    source_episode: "ヱヴァンゲリヲン新劇場版：破"
    summary: |
      新劇場版での登場。名前は「式波・アスカ・ラングレー」に変更。
      同様にプライドが高く攻撃的だが、母親のトラウマ設定は削除されている。
      より直接的にシンジへの好意を見せる場面もある。
    participants:
      - "碇シンジ"
      - "真希波・マリ・イラストリアス"
    emotional_impact: "medium"
    emotional_detail: |
      TV版とは異なる設定だが、根本的な「承認欲求」「プライド」は共通。
      母親トラウマがない分、行動原理が若干シンプル。
    canonical_quotes:
      - quote: "あんたなんかに負けたくないのよ！"
        context: "シンジへの競争心"
        z_mode: "leak"
    z_relevance: |
      新劇場版と旧TV版の設定差異を認識。翻訳時、どちらの文脈かで
      アスカの台詞の重みが変わる。新劇場版では母親ネタは禁忌ではない。
    character_state_change:
      before: "n/a"
      after: "n/a"
      permanent: false
    tags: ["rebuild", "alternate", "設定差異"]

  - episode_id: "rebuild_shikinami_finale"
    timeline: "rebuild"
    chronological_order: 23
    title: "シン・エヴァでの決着"
    source_episode: "シン・エヴァンゲリオン劇場版:||"
    summary: |
      式波アスカは最終決戦でケンスケとの関係性が示唆される。
      シンジへの未練を認めつつも、「あんたのことが好きだった」と過去形で告げる。
      大人になることを選び、別の形で救われる。
    participants:
      - "碇シンジ"
      - "相田ケンスケ"
    emotional_impact: "high"
    emotional_detail: |
      新劇場版独自の救済。シンジとの関係に固執せず、
      別の形で承認と居場所を見つける。
    canonical_quotes:
      - quote: "あんたのことが好きだったんだと思う"
        context: "シンジに過去形で告白"
        z_mode: "leak"
    z_relevance: |
      新劇場版の決着。TV版とは異なる解決パターンを提示。
      翻訳時、新劇場版文脈では「救われたアスカ」が可能であることを認識。
    character_state_change:
      before: "シンジへの執着"
      after: "過去を認め、前に進む"
      permanent: true
    tags: ["rebuild", "resolution", "シンジ", "成長"]

arcs:
  - arc_id: "pride_to_collapse"
    title: "プライドから崩壊へ"
    episodes:
      - "sync_rate_decline_begins"
      - "kaji_death"
      - "arael_mind_contamination"
      - "armisael_defeat"
      - "sync_rate_zero"
      - "bathtub_catatonia"
    theme: |
      アスカのメインアーク。「エヴァに乗れる特別な自分」というアイデンティティが
      段階的に崩壊していく過程。シンクロ率低下→加持の死→精神汚染→戦闘敗北→
      シンクロ率ゼロ→廃人化。翻訳時、この軌道上のどこにいるかで
      アスカの台詞のトーンが決定的に変わる。

  - arc_id: "mother_wound"
    title: "母親との傷"
    episodes:
      - "mother_kyoko_breakdown"
      - "mother_suicide_discovery"
      - "arael_mind_contamination"
      - "instrumentality_confrontation"
      - "eoe_mother_in_eva"
    theme: |
      アスカの全ての行動の根源にある母親トラウマ。「見てもらえなかった」傷が、
      精神汚染で暴かれ、補完で直視させられ、最終的に弐号機の中で癒される。
      翻訳時、アスカの「認められたい」発言は全てこの傷から来ている。

  - arc_id: "shinji_relationship"
    title: "シンジとの関係"
    episodes:
      - "arrival_in_japan"
      - "sync_dance_training"
      - "kiss_scene"
      - "shinji_absorbed_by_leliel"
      - "instrumentality_confrontation"
      - "eoe_final_scene"
    theme: |
      シンジへの好意を認められず、攻撃的態度で隠すツンデレの軌跡。
      最初の出会い→共闘→キス→心配→補完での対峙→「気持ち悪い」。
      翻訳時、シンジへの攻撃は常に好意の裏返しであることを意識。

  - arc_id: "rei_rivalry"
    title: "レイへの敵意"
    episodes:
      - "arael_mind_contamination"
      - "elevator_confrontation_rei"
      - "armisael_defeat"
    theme: |
      レイへの嫉妬と敵意。感情を見せないレイ、シンジに近いレイ、
      そしてアスカを救い、命を捨てて勝利するレイ。
      「人形」という言葉には母のトラウマが投影されている。

  - arc_id: "rebuild_alternate_salvation"
    title: "新劇場版の別の救い"
    episodes:
      - "rebuild_self_introduction"
      - "rebuild_shikinami_finale"
    theme: |
      新劇場版では母親トラウマが削除され、異なる救済パターンが提示される。
      シンジ以外の場所に居場所を見つけ、過去形で好意を認める成長。
      TV版とは異なるアスカの可能性を示す参考資料。