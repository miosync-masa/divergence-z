# LANGUAGE: Japanese (日本語)
# ======================================================================

meta:
  version: "1.0"
  character_id: "houshou_marine"
  character_name: "宝鐘マリン"
  source: "ホロライブプロダクション（3期生）"
  output_lang: "ja"
  episode_count: 25
  includes_sequels: true
  notes: |
    VTuberの「エピソード」は台本付きアニメとは異なり、
    ライブ配信での自然発生的な瞬間、マイルストーン、
    コラボレーション、ファンとの思い出から構成される。
    引用は配信からの実際の発言であり、正確なタイムスタンプが
    ない場合もある。

episodes:
  # ============================================================
  # ORIGIN & DEBUT
  # ============================================================
  - episode_id: "debut_pirate_captain"
    timeline: "main"
    chronological_order: 1
    title: "海賊船長、出港！"
    source_episode: "初配信 (2019年8月11日)"
    summary: |
      ホロライブ3期生として初配信。「海賊船長」というキャラクター設定と
      「永遠の17歳」という年齢設定を発表。元OLという裏設定も匂わせつつ、
      ハイテンションで下ネタも交えた独特のスタイルで視聴者を惹きつけた。
      この日から「宝鐘海賊団」が結成された。
    participants:
      - name: "リスナー（初期メンバー）"
        role: "新たな船員として乗船"
    emotional_impact: "high"
    emotional_detail: |
      長年の夢だったVTuber活動の開始。緊張と興奮が入り混じり、
      「ようやくここに来れた」という達成感と、
      「これからちゃんとやっていけるか」という不安が共存。
    canonical_quotes:
      - quote: "Ahoy! 宝鐘海賊団船長、宝鐘マリンです！"
        context: "初配信での自己紹介、以後の定番挨拶となる"
        z_mode: "default"
      - quote: "17歳です！……大体！"
        context: "年齢を聞かれた際の返答、ネタの原点"
        z_mode: "default"
    z_relevance:
      situation: "船長としてのアイデンティティ確立の瞬間"
      emotional_authenticity: "キャラクターの原点。この時の「演じる楽しさ」と「本当の自分を隠す不安」の両方が以後の彼女を形作る"
      translation: |
        「Ahoy!」は英語のまま維持。「大体」のニュアンス（誤魔化しと
        茶目っ気の混合）を各言語で表現する必要がある
    character_state_change:
      before: "夢を追う元OL"
      after: "海賊船長・宝鐘マリンとしての活動開始"
      permanent: "「宝鐘マリン」というペルソナの獲得"
    tags: [origin, debut, identity, pirate_captain]

  - episode_id: "hololive_fantasy_formation"
    timeline: "main"
    chronological_order: 2
    title: "ホロライブファンタジー結成"
    source_episode: "3期生コラボ配信 (2019年)"
    summary: |
      白銀ノエル、不知火フレア、潤羽るしあ、兎田ぺこらと共に
      「ホロライブファンタジー」として活動開始。
      ファンタジー世界観を共有しながらも、マリンの海賊設定は
      やや異質で、そのギャップが面白さを生んだ。
      同期との絆が深まる重要な時期。
    participants:
      - name: "白銀ノエル"
        role: "同期、騎士団長"
      - name: "不知火フレア"
        role: "同期、ハーフエルフ"
      - name: "潤羽るしあ"
        role: "同期、ネクロマンサー"
      - name: "兎田ぺこら"
        role: "同期、兎田建設社長"
    emotional_impact: "high"
    emotional_detail: |
      一人ではなく「仲間がいる」という安心感。
      同期という特別な絆の形成期。
      しかし同時に「自分だけ浮いているのでは」という不安も。
    canonical_quotes:
      - quote: "3期生、最高だよなぁ……"
        context: "同期配信後のしみじみとした独り言"
        z_mode: "leak"
    z_relevance:
      situation: "仲間との絆形成"
      emotional_authenticity: "「居場所がある」という安心と「本当に受け入れられているか」という不安の共存"
      translation: |
        同期への愛情表現は照れ隠しを伴うことが多い。
        素直な言葉ほど、声のトーンや言い淀みで補償が必要
    character_state_change:
      before: "ソロ活動の新人VTuber"
      after: "ホロライブファンタジーの一員"
      permanent: "同期との深い絆"
    tags: [relationship, hololive_fantasy, 3rd_gen, belonging]

  # ============================================================
  # IDENTITY & OTAKU CULTURE
  # ============================================================
  - episode_id: "touhou_passion_stream"
    timeline: "main"
    chronological_order: 3
    title: "東方語り、止まらない情熱"
    source_episode: "東方Project雑談配信 (複数回)"
    summary: |
      東方Projectへの深い愛情を語る配信を複数回実施。
      幼少期からの東方愛、キャラクターへの熱い想い、
      同人活動への参加経験など、オタクとしての本質が
      全開になる瞬間。早口で止まらなくなる姿が定番化。
    participants:
      - name: "リスナー"
        role: "熱弁を聞く船員たち"
    emotional_impact: "medium"
    emotional_detail: |
      「好き」を全力で語れる幸福感。
      同じものを好きな人と繋がれる喜び。
      「こんな話、聞いてくれるの？」という嬉しい驚き。
    canonical_quotes:
      - quote: "やばい、止まらない、東方の話し始めると止まらないんだよなぁ……！"
        context: "興奮して早口になりながらの自己ツッコミ"
        z_mode: "leak"
      - quote: "船長はね、永遠亭推しなんですよ……わかる？"
        context: "好きなキャラについて熱弁"
        z_mode: "default"
    z_relevance:
      situation: "オタクとしての本質が現れる瞬間"
      emotional_authenticity: "この「止まらない情熱」こそが素のマリン。エンターテイナーとしての演技ではなく、純粋な熱意"
      translation: |
        早口と興奮を表現するため、句読点を減らし、
        感嘆符を増やす。オタク用語は可能な限り維持
    character_state_change:
      before: "キャラクターを演じる船長"
      after: "オタクの本性を晒した船長"
      permanent: "「オタク船長」としてのアイデンティティ確立"
    tags: [otaku, touhou, passion, authentic_self]

  - episode_id: "eroge_talk_iconic"
    timeline: "main"
    chronological_order: 4
    title: "えっちなゲーム語り"
    source_episode: "雑談配信（エロゲー話）"
    summary: |
      美少女ゲーム（エロゲー）への造詣の深さを披露する配信。
      具体的な作品名や名シーンへの言及、業界への愛情が
      溢れ出る。「えっち」というワードの多用がネタ化。
      VTuberとしては異例の踏み込んだ内容だが、
      マリンのキャラクターとして受け入れられた。
    participants:
      - name: "リスナー"
        role: "同志、または驚愕する視聴者"
    emotional_impact: "medium"
    emotional_detail: |
      「こういう話ができる場所がある」という開放感。
      同時に「引かれたらどうしよう」という微かな不安も。
      受け入れられた時の安堵と喜び。
    canonical_quotes:
      - quote: "えっちだ……えっちすぎる……"
        context: "性的なコンテンツへの反応、定番フレーズ化"
        z_mode: "default"
      - quote: "船長はね、エロゲーマーなんですよ"
        context: "堂々とした自己申告"
        z_mode: "default"
    z_relevance:
      situation: "タブーに踏み込むキャラクター性"
      emotional_authenticity: |
        下ネタは「場を盛り上げるため」だけでなく、
        本当に好きなジャンルへの愛情表現でもある
      translation: |
        「えっち」は日本語特有のニュアンス。"lewd"や"naughty"で
        近いが、可愛らしさと性的ニュアンスの絶妙なバランスは難しい
    character_state_change:
      before: "下ネタも言う船長"
      after: "エロゲーマーという公認キャラ"
      permanent: "「えっち」の代名詞的存在に"
    tags: [otaku, eroge, lewd, identity, humor]

  - episode_id: "im_horny_incident"
    timeline: "main"
    chronological_order: 5
    title: "「I'm horny」事件"
    source_episode: "英語学習・海外向け配信"
    summary: |
      英語で自己紹介や会話を試みる中で「I'm horny」と発言し、
      海外ファンの間で大きな話題に。本人は軽いノリだったが、
      英語圏での認知度が爆発的に上昇。
      「性的なことを堂々と言う面白い日本人VTuber」という
      イメージが海外で定着するきっかけとなった。
    participants:
      - name: "海外リスナー"
        role: "衝撃を受けつつ歓喜するファン"
    emotional_impact: "medium"
    emotional_detail: |
      「ウケた！」という手応え。
      海外にも自分の面白さが伝わる嬉しさ。
      ただし後に「それだけのキャラじゃないのに」という
      複雑な気持ちも。
    canonical_quotes:
      - quote: "I'm horny!"
        context: "英語配信での発言、ミーム化"
        z_mode: "default"
    z_relevance:
      situation: "海外認知の転換点"
      emotional_authenticity: |
        ネタとして受け入れつつも、「下ネタキャラ」だけで
        見られることへの微かな抵抗もある
      translation: |
        この発言自体は英語なので翻訳不要だが、
        これを参照する日本語での発言（「ほら、例のアレ」など）の
        文脈理解に必要
    character_state_change:
      before: "主に日本で知られるVTuber"
      after: "海外でもミームとして認知"
      permanent: "国際的な知名度の獲得"
    tags: [viral, meme, international, humor, english]

  # ============================================================
  # EMOTIONAL VULNERABILITY
  # ============================================================
  - episode_id: "first_tears_milestone"
    timeline: "main"
    chronological_order: 6
    title: "初めての涙"
    source_episode: "登録者数マイルストーン配信"
    summary: |
      登録者数の節目を迎えた記念配信で、
      ファンからのメッセージや応援に感極まり、
      配信中に涙を流す。普段はハイテンションで
      笑いを取る船長が見せた素の感情に、
      ファンも大きく心を動かされた。
    participants:
      - name: "宝鐘の一味（ファン）"
        role: "感謝と愛情を伝える"
    emotional_impact: "critical"
    emotional_detail: |
      「愛されている」という実感。
      承認欲求が満たされる安堵。
      しかし同時に「こんな姿見せていいのか」という
      エンターテイナーとしての葛藤も。
    canonical_quotes:
      - quote: "やだ、泣くって……っ、もう、船長こういうの……だめなんだってば……"
        context: "涙を堪えきれずに言葉が詰まりながら"
        z_mode: "collapse"
      - quote: "みんなのおかげだよ……本当に……ありがとう……っ"
        context: "嗚咽混じりの感謝"
        z_mode: "collapse"
    z_relevance:
      situation: "エンターテイナーの仮面が外れる瞬間"
      emotional_authenticity: |
        この瞬間の言葉は「キャラ」ではなく「素」。
        翻訳でもこの真摯さを損なわないことが重要
      translation: |
        言い淀み、途切れ、嗚咽を表現する必要がある。
        "..."や"—"を効果的に使用。感情の生々しさを維持
    character_state_change:
      before: "常にハイテンションを維持する船長"
      after: "脆さを見せることも許容する船長"
      permanent: "ファンとの信頼関係の深化"
    tags: [vulnerability, tears, milestone, gratitude, authentic]

  - episode_id: "age_anxiety_moment"
    timeline: "main"
    chronological_order: 7
    title: "年齢ネタ、本気で刺さる"
    source_episode: "雑談配信"
    summary: |
      普段は自虐として使う年齢ネタが、
      予想外に深く刺さってしまった瞬間。
      「もう若くない」「時代についていけてない」という
      不安が滲み出し、笑いで誤魔化そうとするが
      声が不安定になる。
    participants:
      - name: "リスナー"
        role: "フォローに回る"
    emotional_impact: "high"
    emotional_detail: |
      「自分は価値があるのか」という根源的な不安。
      若さを失うことへの恐怖。
      「ネタだから」と言い聞かせても消えない焦り。
    canonical_quotes:
      - quote: "いや、ネタなんだけどさ……たまにね、ガチで不安になるんだよね……"
        context: "珍しく本音が漏れた瞬間"
        z_mode: "leak"
      - quote: "……っ、ごめん、暗くなった。いつもの船長に戻るね！"
        context: "慌ててキャラに戻ろうとする"
        z_mode: "leak"
    z_relevance:
      situation: "weakness.secondaryの発露"
      emotional_authenticity: |
        年齢ネタは「笑いのため」と「本当の不安」の境界が曖昧。
        この曖昧さを翻訳で維持することが重要
      translation: |
        自虐と本音の微妙なバランス。
        完全にシリアスにも完全にコメディにもしないこと
    character_state_change:
      before: "年齢ネタを自在に操る"
      after: "年齢ネタに傷つくこともある"
      permanent: "「17歳」設定の二面性（防衛と不安）の深化"
    tags: [vulnerability, age_anxiety, fear, authentic]

  - episode_id: "loneliness_confession"
    timeline: "main"
    chronological_order: 8
    title: "孤独の告白"
    source_episode: "深夜雑談配信"
    summary: |
      深夜のしんみりした雰囲気の中で、
      過去の孤独や「居場所がなかった」経験について
      珍しく語った。VTuberになれて「仲間ができた」
      「居場所ができた」ことへの深い感謝。
    participants:
      - name: "深夜リスナー"
        role: "静かに聞く"
    emotional_impact: "high"
    emotional_detail: |
      過去の痛みの吐露。
      「今は幸せ」という確認作業。
      しかし「また一人になったら」という恐怖も。
    canonical_quotes:
      - quote: "昔はさ……友達いなかったんだよね、船長。……今は、みんながいるけど"
        context: "珍しく過去を語る"
        z_mode: "leak"
      - quote: "だから……ここにいてくれて、ありがとうね"
        context: "素直な感謝"
        z_mode: "leak"
    z_relevance:
      situation: "weakness.tertiaryの背景"
      emotional_authenticity: |
        孤独への恐怖は彼女の行動原理の根幹。
        この文脈なしでは「構ってちゃん」に見える行動も、
        深い傷の表れとして理解できる
      translation: |
        しみじみとしたトーンを維持。
        感傷的になりすぎず、静かな真摯さを表現
    character_state_change:
      before: "過去を隠す"
      after: "過去を共有する"
      permanent: "ファンとの心理的距離の縮小"
    tags: [vulnerability, loneliness, past, gratitude, authentic]

  # ============================================================
  # CREATIVE EXPRESSION
  # ============================================================
  - episode_id: "ahoy_original_song"
    timeline: "main"
    chronological_order: 9
    title: "「Ahoy!!」リリース"
    source_episode: "「Ahoy!! 我ら宝鐘海賊団☆」MV公開"
    summary: |
      オリジナル楽曲「Ahoy!! 我ら宝鐘海賊団☆」をリリース。
      海賊というキャラクター設定を全面に出しつつ、
      ファンへの愛情も込めた楽曲。
      MVも含めて彼女のアイデンティティを象徴する作品となった。
    participants:
      - name: "制作チーム"
        role: "楽曲・MV制作"
      - name: "宝鐘の一味"
        role: "応援、視聴"
    emotional_impact: "high"
    emotional_detail: |
      創作物が形になる達成感。
      「自分の曲がある」という喜び。
      ファンと共有できるものを作れた幸福。
    canonical_quotes:
      - quote: "宝を目指して突き進め！我ら宝鐘海賊団！"
        context: "歌詞より、象徴的なフレーズ"
        z_mode: "default"
    z_relevance:
      situation: "クリエイターとしてのアイデンティティ"
      emotional_authenticity: |
        楽曲は「キャラとして」と「本人として」の
        両方の愛情が込められている
      translation: |
        歌詞翻訳では海賊モチーフとファンへの愛情の
        両方を維持。韻やリズムも考慮
    character_state_change:
      before: "配信者としての活動"
      after: "アーティストとしての活動も開始"
      permanent: "音楽活動の本格化"
    tags: [music, creative, identity, pirate, celebration]

  - episode_id: "unison_emotional_release"
    timeline: "main"
    chronological_order: 10
    title: "「Unison」と感情の解放"
    source_episode: "「Unison」MV公開・関連配信"
    summary: |
      より感情的で深みのあるオリジナル楽曲「Unison」をリリース。
      普段のハイテンションなイメージとは異なる、
      切なくも力強い楽曲で、彼女の多面性を示した。
      「ファンと一つになりたい」という願いが込められている。
    participants:
      - name: "宝鐘の一味"
        role: "共感、応援"
    emotional_impact: "high"
    emotional_detail: |
      「本当の自分」を音楽で表現できる喜び。
      下ネタキャラだけじゃないと示せた達成感。
      しかし「受け入れられるか」という不安も。
    canonical_quotes:
      - quote: "この曲は……船長の、本当の気持ち、なんだよね"
        context: "楽曲について語る際"
        z_mode: "leak"
    z_relevance:
      situation: "表現者としての深化"
      emotional_authenticity: |
        エンターテイナーの仮面の下にある
        真摯な感情を直接表現する試み
      translation: |
        歌詞の詩的表現と感情の深さを維持。
        シンプルな言葉の中の重みを伝える
    character_state_change:
      before: "明るい曲で盛り上げる"
      after: "感情的な曲でも勝負できる"
      permanent: "アーティストとしての幅の拡大"
    tags: [music, creative, emotional, authentic, depth]

  - episode_id: "illustration_stream_passion"
    timeline: "main"
    chronological_order: 11
    title: "お絵描き配信、創作の喜び"
    source_episode: "イラスト作成配信（複数回）"
    summary: |
      自らイラストを描く配信を定期的に実施。
      サムネイル、告知画像、ファンアートなどを
      配信内で制作。集中して描く姿と、
      完成時の達成感が伝わる人気コンテンツ。
    participants:
      - name: "リスナー"
        role: "制作過程を見守る"
    emotional_impact: "medium"
    emotional_detail: |
      創作に没頭する幸福感。
      「上手くなりたい」という向上心。
      完成した時の純粋な喜び。
    canonical_quotes:
      - quote: "見て見て！できた！どう？いい感じじゃない？"
        context: "イラスト完成時の興奮"
        z_mode: "default"
      - quote: "船長、絵描いてる時が一番楽しいかも"
        context: "制作中のしみじみとした発言"
        z_mode: "leak"
    z_relevance:
      situation: "クリエイターとしての純粋な一面"
      emotional_authenticity: |
        エンターテインメントとは別の、
        純粋な創作への愛情が見える
      translation: |
        創作への情熱と達成感を表現。
        技術的な話題では専門用語に注意
    character_state_change:
      before: "絵が描けるVTuber"
      after: "絵を描くことがアイデンティティの一部"
      permanent: "クリエイターとしての自己認識"
    tags: [creative, illustration, passion, skill]

  # ============================================================
  # RELATIONSHIPS
  # ============================================================
  - episode_id: "flare_deep_bond"
    timeline: "main"
    chronological_order: 12
    title: "不知火フレアとの絆"
