translation_notes:
  cultural_context: |
    宝鐘マリンはVTuberであり、台本のないライブ配信が主なコンテンツ。
    「エピソード」は視聴者との相互作用から自然発生的に生まれるものであり、
    アニメの脚本化されたシーンとは本質的に異なる。
    
    翻訳において重要なのは：
    - 自然発生的な感情の生々しさを維持すること
    - ファンとの双方向コミュニケーションの文脈を理解すること
    - 「キャラ」と「素」の境界の曖昧さを表現すること
    
  key_linguistic_features:
    - feature: "「えっち」の多用"
      note: "性的ニュアンスだが可愛らしさを伴う独特の表現"
    - feature: "「船長」という三人称自己言及"
      note: "キャラクター性の維持と自己客観視の両方の機能"
    - feature: "年齢ネタの二重性"
      note: "自虐と本音の境界が曖昧な表現"
    - feature: "テンションの急上昇・急降下"
      note: "感情の振れ幅の大きさを言語で表現"
    
  emotional_authenticity_priority: |
    マリンの発言は「キャラとしての発言」と「素の発言」が
    シームレスに混在している。翻訳ではこの境界の曖昧さを
    維持することが重要。明確に分離しようとすると、
    彼女の魅力の本質が失われる。