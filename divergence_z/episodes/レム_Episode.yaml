      スバルを支えるための戦いでもある。
      ペテルギウス率いる怠惰の大罪司教に立ち向かう。
    participants:
      - "ナツキ・スバル"
      - "ペテルギウス・ロマネコンティ"
      - "エミリア陣営"
    emotional_impact: "high"
    emotional_detail: |
      過去と向き合う戦い。
      でも今は一人ではない。
      スバルがいる。
      彼のために戦える喜び。
    canonical_quotes:
      - quote: "スバルくんの傍に、レムはいます"
        context: "魔女教との戦いの中で"
        speaker: "レム"
        z_mode: "devotion"
    z_relevance: |
      レムの献身が行動として示される場面。
      言葉と行動の一致——レムの信頼性を示す。
    character_state_change:
