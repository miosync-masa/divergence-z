translation_implications:
  critical_patterns:
    - pattern: "「レムは〜」という自己言及"
      episodes: ["twin_birth_taboo", "from_zero_declaration"]
      translation_note: |
        日本語の自己名呼称は、英語では基本的にI/meになる。
        ただしエモーショナルなシーンでは、
        三人称的な表現で再現を試みることがある。
        重要なのは、この自己言及に「存在してはいけない者」としての
        烙印の重みが込められていること。

    - pattern: "「スバルくん」という呼称"
      episodes: ["subaru_rescue", "love_confession"]
      translation_note: |
        「くん」の敬意と親愛のバランスは翻訳困難。
        "Subaru-kun"とそのまま残すか、
        文脈で温かみを補償するか判断が必要。
        この呼称には、第2章での救済と
        第18話での告白の全ての重みがある。

    - pattern: "「姉様」という呼称"
      episodes: ["ram_genius_revelation", "witch_cult_attack"]
      translation_note: |
        「姉様」には敬愛、憧憬、劣等感、罪悪感が全て含まれる。
        単なる"Sister"や"Ram"では不十分。
        "Nee-sama"と保持するか、
        文脈で複雑な感情を補償する。

    - pattern: "「レムの英雄」という表現"
      episodes: ["lap_pillow_promise", "renewed_determination"]
      translation_note: |
        "Rem's hero"は直訳可能だが、
        この表現に込められた膝枕シーンの温かさ、
        第18話での復活の喜びを意識する。

    - pattern: "丁寧語の崩れ"
      episodes: ["rem_confession_speech", "love_confession"]
      translation_note: |
        感情が昂った時の丁寧語の揺らぎは、
        英語では別の手法で表現する必要がある。
        言い淀み、繰り返し、文の途切れなど。

  episode_specific_vocabulary:
    from_zero_declaration:
      - term: "ゼロから"
        significance: "作品タイトルの回収、レム自身の体験の投影"
        translation: "From zeroを維持、「一からではなく」との対比を意識"

    subaru_rescue:
      - term: "君の代わりなんていない"
        significance: "「姉の代わり」として生きてきたレムへの決定的な肯定"
        translation: "There is no substitute for youの重みを維持"

    i_love_emilia_response:
      - term: "そんなスバルくんを愛しています"
        significance: "エミリアを好きな「そんな」スバルをこそ愛している"
        translation: "そんなのニュアンス——拒絶されてもなお、を正確に"

notes:
  canon_verification: |
    主要な引用は原作小説およびアニメ版から。
    第18話の台詞は特に重要であり、公式翻訳との整合性を確認推奨。
    IFルート「ナツキ・レム」は公式短編。

  emotional_continuity: |
    レムの全ての言動には、幼少期のトラウマと
    スバルによる救済の記憶が影響している。
    翻訳時、表面的な台詞の意味だけでなく、
    その背景にある感情の連続性を意識する必要がある。

  character_state_awareness: |
    本編第4章以降、レムは昏睡状態にあり、
    世界中の人々から忘れられている。
    スバルだけがレムを覚えている状態。
    この状況がレムの物語の現在地点。

  if_route_handling: |
    レムIFルートは公式の「もしも」の物語。
    本編との対比で、レムの選択の意味が際立つ。
    翻訳時、IFルートの甘さと本編の苦さを対比させる。