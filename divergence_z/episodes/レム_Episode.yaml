  # ===========================================================================
  # 第3章〜第4章間 — 暴食による消去
  # ===========================================================================

  - episode_id: "gluttony_attack"
    timeline: "main"
    chronological_order: 26
    title: "暴食の大罪司教——記憶と存在の消去"
    source_episode: "原作第3章終盤/アニメ第2期"
    summary: |
      魔女教・暴食の大罪司教ライ・バテンカイトスの攻撃を受け、
      レムは「記憶」と「名前（存在）」を喰われる。
      結果、レムは昏睡状態に陥り、
      世界中の人々からレムの記憶が消去される。
      スバル以外の全員が、レムのことを忘れてしまう。
    participants:
      - "ライ・バテンカイトス（暴食）"
      - "クルシュ"
    emotional_impact: "critical"
    emotional_detail: |
      レム自身には、「食べられた」という認識すらない。
      ただ意識が途絶え、眠り続けるだけ。
      しかしこれは、レムにとっての「存在の消去」——
      最も恐れていた「いらない存在になること」の究極形。
    canonical_quotes: []
    z_relevance: |
      レムが「忘れられた」という状況は、
      彼女の最大の恐怖の具現化。
      「必要とされたい」というレムの願いの対極にある悲劇。
      翻訳時、この悲劇の重みを理解する必要がある。
    character_state_change:
      before: "スバルと共に戦い終えた状態"
      after: "記憶と存在を失った昏睡状態"
      permanent: "現在も継続中"
    tags:
      - "tragedy"
      - "gluttony"
      - "memory_loss"
      - "coma"
      - "turning_point"

  - episode_id: "forgotten_by_all"
    timeline: "main"
    chronological_order: 27
    title: "忘れられた少女"
    source_episode: "原作第4章/アニメ第2期第1話"
    summary: |
      ラムさえもレムのことを覚えていない。
      姉様に忘れられた——レムにとって、これ以上の悲劇はない。
      スバルだけがレムを覚えており、
      彼女を取り戻すことを誓う。
    participants:
      - "ナツキ・スバル"
      - "ラム（姉様）"
      - "エミリア陣営"
    emotional_impact: "critical"
    emotional_detail: |
      レム自身は眠っているため、この状況を知らない。
      しかしこれは、レムの物語としては最大の悲劇。
      「存在してはいけない」と思っていた少女が、
      本当に「存在しなかったこと」にされてしまった。
    canonical_quotes:
      - quote: "レムって、誰のこと？"
        context: "クルシュの問いかけ"
        speaker: "クルシュ"
        z_mode: "neutral"
    z_relevance: |
      レムの「忘れられた」状態は、
      第2期以降の全ての翻訳に影響する。
      レムの名前が出る度に、「誰も覚えていない」という
      悲劇の重みが付きまとう。
    character_state_change:
      before: "昏睡状態"
      after: "忘れられた昏睡状態"
      permanent: "現在も継続中"
    tags:
      - "tragedy"
      - "forgotten"
      - "ram_relationship"
      - "continuation"

  # ===========================================================================
  # IFルート — レムIF「ナツキ・レム」
  # ===========================================================================

  - episode_id: "rem_if_escape"
    timeline: "if_rem"
    chronological_order: 101
    title: "レムIF——逃避行"
    source_episode: "短編「ナツキ・レム」"
    summary: |
      もしスバルが「逃げよう」という提案を、
      レムが受け入れていたら——というIFルート。
      二人は全てを捨てて逃げ出し、
      カララギで新しい人生を始める。
    participants:
      - "ナツキ・スバル"
    emotional_impact: "high"
    emotional_detail: |
      本編とは違う選択をした世界。
      スバルの「逃げよう」を受け入れる。
      それは「英雄」を諦めさせることでもあるが、
      同時に二人だけの幸せを選ぶこと。
    canonical_quotes:
      - quote: "スバルくんと一緒なら、どこへでも"
        context: "逃避行を受け入れる"
        speaker: "レム"
        z_mode: "acceptance"
    z_relevance: |
      IFルートの存在は、本編のレムの選択の重みを示す。
      「受け入れることもできた」のに、
      レムは「英雄」を諦めさせなかった。
      翻訳時、この選択の意味を理解する必要がある。
    character_state_change:
      before: "本編の分岐点"
      after: "逃避行を選んだ世界線"
      permanent: "IF限定"
    tags:
      - "if_route"
      - "alternative"
      - "escape"
      - "happiness"

  - episode_id: "rem_if_family"
    timeline: "if_rem"
    chronological_order: 102
    title: "レムIF——ナツキ家の幸福"
    source_episode: "短編「ナツキ・レム」"
    summary: |
      カララギでスバルとレムは「ナツキ」姓を名乗り、
      子供をもうけ、幸せな家庭を築く。
      リグルスとスピカという二人の子供に恵まれ、
      平凡だが満ち足りた日々を送る。
    participants:
      - "ナツキ・スバル"
      - "リグルス（息子）"
      - "スピカ（娘）"
    emotional_impact: "high"
    emotional_detail: |
      レムが手に入れた「もう一つの幸福」。
      英雄ではないスバルと、
      母親としてのレム。
      穏やかで、温かい、日常の幸せ。
    canonical_quotes:
      - quote: "おかえりなさい、あなた"
        context: "帰宅したスバルを迎える"
        speaker: "レム"
        z_mode: "domestic"
      - quote: "レムは今、とても幸せです"
        context: "家族と過ごす日常で"
        speaker: "レム"
        z_mode: "contentment"
    z_relevance: |
      レムの「もう一つの可能性」。
      本編では得られない幸福の形。
      翻訳時、このIFルートの甘さと
      本編との対比を意識する。
    character_state_change:
      before: "逃避行を選んだ状態"
      after: "家庭を持った幸福な状態"
      permanent: "IF限定"
    tags:
      - "if_route"
      - "family"
      - "happiness"
      - "domestic"

arc_progressions:
  - arc_id: "self_worth_journey"
    title: "自己価値の探求——「姉の代わり」から「レム」へ"
    description: |
      生まれながらに「存在してはいけない」と烙印を押され、
      姉の「代わり」として生きてきたレムが、
      スバルとの出会いを通じて「レムとして」の価値を見出す旅路。
    episode_sequence:
      - "twin_birth_taboo"
      - "ram_genius_revelation"
      - "forbidden_wish"
      - "witch_cult_attack"
      - "subaru_rescue"
      - "horn_loss_confession"
      - "from_zero_declaration"
    emotional_trajectory: "自己否定 → 存在価値の発見 → 自己肯定の萌芽"
    z_translation_note: |
      このアークを理解することで、レムの自己否定的な言動と
      スバルへの感謝の深さが翻訳できる。
      「レムは」という自己言及には、このアーク全体の重みがある。

  - arc_id: "love_and_devotion"
    title: "愛と献身——英雄への帰依"
    description: |
      最初はスバルを「脅威」として排除しようとしたレムが、
      彼の行動と言葉によって変わり、
      絶対的な愛と献身を捧げるようになる物語。
    episode_sequence:
      - "first_encounter_subaru"
      - "loop2_murder"
      - "subaru_rescue"
      - "lap_pillow_promise"
      - "rem_confession_speech"
      - "love_confession"
      - "i_love_emilia_response"
    emotional_trajectory: "敵意 → 困惑 → 信頼 → 愛情 → 献身 → 報われない愛の受容"
    z_translation_note: |
      レムのスバルへの呼称「スバルくん」には、
      このアーク全体の変化が込められている。
      敵だった相手を愛するようになった重みを翻訳で維持する。

  - arc_id: "oni_and_maid"
    title: "鬼とメイド——二つの顔"
    description: |
      穏やかで献身的なメイドと、
      苛烈で暴力的な鬼戦士という二面性。
      どちらもレムの本質であり、
      愛する者を守るためにどちらも使う。
    episode_sequence:
      - "loop2_murder"
      - "rem_rampage"
      - "white_whale_battle"
      - "witch_cult_battle"
    emotional_trajectory: "抑圧 → 解放 → 統合 → 制御された力"
    z_translation_note: |
      レムの二面性は翻訳上重要。
      穏やかな口調と暴力的な行動のギャップ、
      あるいは戦闘時の口調の変化を正確に表現する。

  - arc_id: "tragedy_of_forgetting"
    title: "忘却の悲劇——消された存在"
    description: |
      「必要とされたい」と願い続けたレムが、
      暴食の大罪司教によって「存在しなかったこと」にされる悲劇。
      レムの最大の恐怖が現実となる。
    episode_sequence:
      - "gluttony_attack"
      - "forgotten_by_all"
    emotional_trajectory: "存在の消去 → 忘却される悲劇"
    z_translation_note: |
      レムの「忘れられた」状態は、
      彼女の存在論的恐怖の具現化。
      第2期以降、レムの名前が出る度に
      この悲劇の重みを意識する必要がある。

  - arc_id: "if_happiness"
    title: "IFの幸福——選ばれなかった道"
    description: |
      本編では「英雄」を諦めさせなかったレムが、
      もし「逃げよう」を受け入れていたら——
      というもう一つの幸福の形。
    episode_sequence:
      - "rem_if_escape"
      - "rem_if_family"
    emotional_trajectory: "選択 → 逃避 → 家庭の幸福"
    z_translation_note: |
      IFルートの存在は、本編のレムの選択の重みを示す。
      翻訳時、本編とIFの対比を意識する。

