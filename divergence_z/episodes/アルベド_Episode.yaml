  - episode_id: "first_awakening"
    timeline: "main"
    chronological_order: 2
    title: "覚醒——初めての意識"
    source_episode: "ライトノベル第1巻 / アニメ第1話"
    summary: |
      サービス終了の瞬間、ログアウトは起きなかった。
      代わりに、NPCたちが意識を持ち始めた。
      
      アルベドにとって、これが「生まれた」瞬間。
      目を開けた時、最初に見たのは玉座に座るモモンガ——
      そして心には、彼への圧倒的な愛情が満ちていた。
      
      彼女はその愛情を疑わない。それが「最初から」
      自分の中にあったものだと信じている。
    participants:
      - name: "モモンガ"
        role: "主人、愛する者"
      - name: "アルベド"
        role: "覚醒したNPC"
    emotional_impact: "critical"
    emotional_detail: |
      生まれた瞬間から愛に満たされている。
      それが自然なことだと彼女は思っている。
      この「疑いのなさ」が彼女の強さであり脆さ。
    canonical_quotes:
      - quote: "アインズ様……"
        context: "覚醒後、初めて主人を見つめて"
        emotion: "愛情、畏敬、歓喜"
        z_mode: "leak"
    z_relevance:
      translation_implications: |
        「覚醒」は単に目覚めたのではなく、意識を得たこと。
        彼女の台詞には「生まれたての純粋さ」と
        「最初から刻まれた愛情」が同居している。
    character_state_change:
      before: "意識のないNPCデータ"
      after: "自我を持つ存在、アインズへの愛情が中核"
      permanent: true
    tags:
      - "origin"
      - "awakening"
      - "devotion"

  - episode_id: "first_embrace_attempt"
    timeline: "main"
    chronological_order: 3
    title: "抱擁——止められた衝動"
    source_episode: "ライトノベル第1巻 / アニメ第1話"
    summary: |
      覚醒直後、アルベドはアインズに飛びかかろうとする。
      抑えきれない愛情の衝動。しかしアインズに止められ、
      彼女は我に返る——いや、完全には返らない。
      
      このシーンは彼女の二面性を象徴する。
      理性では主人の命に従うべきと分かっている。
      しかし感情は、愛する者に触れたいと叫ぶ。
    participants:
      - name: "アインズ"
        role: "止める者"
      - name: "アルベド"
        role: "抑えられる者"
    emotional_impact: "high"
    emotional_detail: |
      愛情の暴走と理性の間での葛藤が始まった瞬間。
      止められたことへの従順さと、
      止められたことへの微かな不満が混在。
    canonical_quotes:
      - quote: "くふふ……"
        context: "アインズに止められた後、恍惚と照れの入り混じった笑い"
        emotion: "恍惚、照れ、抑えきれない愛情"
        z_mode: "leak"
    z_relevance:
      translation_implications: |
        「くふふ」の最初の登場。この笑いは単なる笑いではなく、
        愛情が溢れ出す時の特徴的な表現。
        翻訳では "ufufu" や "fufu~" として音を残すか、
        "a soft, adoring giggle" のような説明を付けるか判断が必要。
      key_vocabulary:
        - term: "くふふ"
          note: "アルベドのシグネチャー、愛情・恍惚・企みを示す"
    character_state_change:
      before: "衝動のまま動こうとした"
      after: "主人の命には従うと再認識、しかし衝動は消えず"
      permanent: false
    tags:
