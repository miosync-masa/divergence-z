    emotional_detail: |
      アインズの無事への純粋な喜び。
      シャルティア復活への複雑な感情——安堵と警戒。
      「これでまたライバルが」という本音と、
      「ナザリックの守護者として良かった」という建前。
    canonical_quotes:
