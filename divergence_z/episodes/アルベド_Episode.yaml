    source_episode: "ライトノベル第3巻 / アニメ第10話"
    summary: |
      階層守護者シャルティアが何者かに洗脳され、
      アインズに反旗を翻すという最悪の事態。
      
      アルベドにとって、これは複雑な感情を引き起こす。
      恋敵の失態への暗い喜び——いや、それ以上に、
      ナザリックの危機、アインズの悲しみへの怒り。
      
      「誰がシャルティアを操った？ 許さない」
      主を傷つけた者への純粋な殺意。
    participants:
