      - "guardians"

  - episode_id: "supreme_beings_discussion"
    timeline: "main"
    chronological_order: 5
    title: "去りし者たちへの怒り"
    source_episode: "ライトノベル第1巻〜第3巻"
    summary: |
      至高の四十一人——かつてナザリックを支配したプレイヤーたち。
      しかしゲームに飽き、一人また一人と去っていった。
      
      アルベドは表向き、至高の存在として彼らを敬う。
      しかし内心では、アインズを置いて去った者たちへの
      強い怒りと軽蔑を抱いている。
      
      「最後まで残ってくださったアインズ様こそが真の主」
      ——この信念が、後に秘密の行動へと繋がる。
    participants:
      - name: "アインズ"
        role: "最後まで残った唯一の主"
      - name: "至高の四十一人"
        role: "去っていった創造主たち"
    emotional_impact: "high"
    emotional_detail: |
      複雑な感情。創造主として敬うべきという建前と、
      アインズを見捨てた許せなさという本音の葛藤。
      この怒りは秘められ、後に危険な形で表出する。
    canonical_quotes:
      - quote: "[unverified] アインズ様だけが、最後まで……"
        context: "他の至高の存在が去ったことへの言及"
        emotion: "崇敬、怒り（抑制）"
        z_mode: "stable"
    z_relevance:
      translation_implications: |
