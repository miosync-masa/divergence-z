  # === 帝国・王国編 ===

  - episode_id: "nazarick_invasion_workers"
    timeline: "main"
    chronological_order: 10
    title: "ナザリック侵入者——蹂躙の宴"
    source_episode: "ライトノベル第7巻 / アニメ第3期"
    summary: |
      帝国に雇われたワーカー（傭兵冒険者）たちが
      ナザリックに侵入する。これはアインズの罠だった。
      
      アルベドにとって、侵入者は「虫」に過ぎない。
      アインズの聖域を穢す愚か者ども。
      彼らの末路に一片の同情もない——むしろ、
      アインズの計画が見事に進むことへの喜び。
    participants:
      - name: "アインズ"
        role: "罠を仕掛けた主"
      - name: "アルベド"
        role: "侵入者を迎え撃つ統括者"
      - name: "ワーカーたち"
        role: "侵入者、犠牲者"
    emotional_impact: "medium"
    emotional_detail: |
      侵入者への純粋な軽蔑と殺意。
      アインズの計画通りに事が進む喜び。
      人間の命への徹底的な無関心。
    canonical_quotes:
      - quote: "愚かな者たちですわね。アインズ様の御前で……"
        context: "侵入者を見下しながら"
        emotion: "軽蔑、冷酷"
        z_mode: "stable"
    z_relevance:
      translation_implications: |
        人間への態度を訳す際、「悪役」ではなく
        「異なる価値観の存在」として描くこと。
