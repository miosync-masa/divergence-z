      - "devotion"
      - "impulse_control"
      - "signature_laugh"

  - episode_id: "guardians_loyalty_declaration"
    timeline: "main"
    chronological_order: 4
    title: "守護者の忠誠宣言"
    source_episode: "ライトノベル第1巻 / アニメ第1話"
    summary: |
      アインズが各階層守護者を召集し、忠誠を確認する場面。
      アルベドは守護者統括として、最も熱烈な忠誠を誓う。
      
      他の守護者たちも忠誠を誓うが、アルベドの誓いには
      「忠誠」を超えた「愛」が込められていた。
      それは職務上の献身ではなく、存在の全てを捧げる宣言。
