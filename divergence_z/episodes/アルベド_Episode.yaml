        role: "共に忠誠を誓う同志"
    emotional_impact: "high"
    emotional_detail: |
      公式の場で愛を誓える喜び。
      他の守護者と同じ場に立ちながら、
      自分だけが「特別な想い」を持っていることへの優越感。
    canonical_quotes:
      - quote: "我らが忠誠、この命尽きるまで"
        context: "守護者たちの忠誠宣言（集団）"
        emotion: "厳粛、献身"
        z_mode: "stable"
    z_relevance:
      translation_implications: |
        「忠誠」と「愛」の境界が曖昧なアルベドの言葉遣いに注意。
        他の守護者と同じ言葉を使っても、込められた感情が異なる。
        翻訳では同じ単語でも、アルベドの台詞には
        微妙に異なるニュアンスを持たせる工夫が求められる。
    character_state_change:
      before: "個人的な愛情"
      after: "公式に表明された忠誠と愛の統合"
      permanent: true
    tags:
