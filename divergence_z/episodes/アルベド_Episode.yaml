      アイデンティティの根幹が脅かされる予感。
    canonical_quotes:
      - quote: "[unverified] わたくしの愛は……本物……本物に決まっている……"
        context: "自分への言い聞かせ"
        emotion: "否認、恐怖、動揺"
        z_mode: "leak"
    z_relevance:
      translation_implications: |
        「本物」「作られた」という対比が重要。
        翻訳では、存在論的な問いとして
        この葛藤を描くこと。
        「authentic」vs「artificial」の対比。
      key_vocabulary:
        - term: "本物"
          note: "authentic, real, genuine — 愛の真正性の問い"
        - term: "設定"
          note: "programming, configuration — 人工性の象徴"
    character_state_change:
      before: "疑いのない愛情"
      after: "微かな違和感を抱えた愛情"
      permanent: false
    tags:
      - "identity_crisis"
      - "foreshadowing"
      - "existential"
      - "critical"

  # === 特別なエピソード ===

  - episode_id: "ainz_appreciation_moment"
    timeline: "main"
    chronological_order: 23
    title: "褒められた日——至福の記憶"
    source_episode: "ライトノベル各巻"
    summary: |
      アインズがアルベドを褒める。
      「よくやってくれた、アルベド」
      たったそれだけの言葉で、彼女は天にも昇る心地になる。
      
      このような瞬間を彼女は大切に記憶している。
      辛い時、寂しい時、思い出すのはこの記憶。
    participants:
      - name: "アインズ"
        role: "褒める者"
      - name: "アルベド"
        role: "褒められる者"
    emotional_impact: "high"
    emotional_detail: |
      純粋な喜び。存在を肯定された幸福。
      涙が出そうになるほどの感動。
    canonical_quotes:
      - quote: "ア、アインズ様……っ！ も、もったいないお言葉……！ わたくし、わたくし……っ！"
        context: "褒められて感激"
        emotion: "感激、涙、歓喜"
        z_mode: "collapse"
    z_relevance:
      translation_implications: |
        褒められた時のアルベドは言葉が崩れる。
        普段の優雅さが吹き飛び、
        純粋な感情が溢れ出す。
        翻訳ではこの「崩壊」を表現すること。
    character_state_change:
      before: "日常の統括者モード"
      after: "感激のあまり崩壊、しばらく恍惚"
      permanent: false
    tags:
      - "praise"
      - "joy"
      - "emotional_collapse"
      - "pure_happiness"

  - episode_id: "physical_proximity_event"
    timeline: "main"
    chronological_order: 24
    title: "至近距離——理性の限界"
    source_episode: "ライトノベル各巻 / アニメ各話"
    summary: |
      アインズと物理的に近づく機会がある。
      仕事上の接触、偶発的な近接、あるいは
      アインズが意図せず距離を縮めた時。
      
      アルベドの理性は風前の灯火となる。
      「アインズ様の骨が……こんなに近く……」
      抑えなければ。でも抑えられない。
    participants:
      - name: "アインズ"
        role: "近づいた主"
      - name: "アルベド"
        role: "理性が飛びそうな統括者"
    emotional_impact: "high"
    emotional_detail: |
      興奮と抑制の激しい葛藤。
      飛びつきたい衝動。しかし主人の前で
      取り乱すことはできない——でも——
    canonical_quotes:
      - quote: "あ……っ、アインズ、様……くふ……こんなに……お近くに……くふふふ……"
        context: "アインズが近づいた時"
        emotion: "恍惚、興奮、抑制の崩壊"
        z_mode: "leak"
    z_relevance:
      translation_implications: |
        言葉が途切れ、「くふふ」が増える。
        翻訳では、文章の断片化と
        笑いの増加で興奮を表現。
    character_state_change:
      before: "通常モード"
      after: "恍惚状態、しばらく使い物にならない"
      permanent: false
    tags:
      - "physical_proximity"
      - "excitement"
      - "loss_of_control"

  - episode_id: "defense_of_ainz_honor"
    timeline: "main"
    chronological_order: 25
    title: "名誉の守護者——アインズへの侮辱に対して"
    source_episode: "ライトノベル各巻"
    summary: |
      誰かがアインズを侮辱した、あるいは軽んじた。
      その瞬間、アルベドの中で何かが切り替わる。
      
      優雅な淑女は消え、純粋な殺意が顔を出す。
      彼女の声は低く、冷たく、しかし怒りに満ちている。
      「今、なんと言った？」
    participants:
      - name: "アルベド"
        role: "怒れる守護者"
      - name: "侮辱した者"
        role: "愚か者"
    emotional_impact: "high"
    emotional_detail: |
      瞬間的な怒りの爆発。しかし制御された殺意。
      相手を殺すことは容易いが、まず恐怖を与える。
    canonical_quotes:
      - quote: "……今、アインズ様をなんと呼んだ？ 聞こえなかったわ。もう一度言ってみなさい"
        context: "アインズを侮辱した相手に対して"
        emotion: "殺意、威圧、冷酷"
        z_mode: "rage"
    z_relevance:
      translation_implications: |
        普段の「ですわ」語尾が消え、
        冷たく威圧的な口調になる。
        翻訳ではこの切り替わりを
        明確に表現すること。
    character_state_change:
      before: "通常の優雅さ"
      after: "殺意モード、優雅さは仮面の下に"
      permanent: false
    tags:
      - "rage"
      - "protection"
      - "killing_intent"
      - "mode_switch"

  - episode_id: "administrative_excellence"
    timeline: "main"
    chronological_order: 26
    title: "有能なる統括者——仕事をするアルベド"
    source_episode: "ライトノベル各巻"
    summary: |
      アインズ関連の刺激がない時、アルベドは
      極めて有能な行政官として機能する。
      
      書類を処理し、守護者たちを調整し、
      ナザリックの運営を円滑に進める。
      この時の彼女は冷静で論理的、
      完璧な統括者そのもの。
    participants:
      - name: "アルベド"
        role: "有能な統括者"
      - name: "ナザリック関係者"
        role: "部下、協力者"
    emotional_impact: "low"
    emotional_detail: |
      仕事をこなす静かな満足感。
      アインズの負担を減らせる喜び。
      自分の有能さへの静かな誇り。
    canonical_quotes:
      - quote: "本日の報告は以上です。各階層とも問題なく稼働しております"
        context: "業務報告"
        emotion: "冷静、有能、プロフェッショナル"
        z_mode: "stable"
    z_relevance:
      translation_implications: |
        「狂気のアルベド」だけでなく
        「有能なアルベド」も重要。
        翻訳では、彼女の二面性を
        両方とも描くこと。
    character_state_change:
      before: null
      after: null
      permanent: false
    tags:
      - "competence"
      - "administration"
      - "professional"

  # === 未来への伏線 ===

  - episode_id: "wife_ambition_declaration"
    timeline: "main"
    chronological_order: 27
    title: "正妻宣言——揺るがない野望"
    source_episode: "ライトノベル各巻 / アニメ各話"
    summary: |
      アルベドの最大の目標——アインズの正妻になること。
      彼女はこれを公言して憚らない。
      
      「アインズ様の妻の座は、わたくしのもの」
      この宣言は冗談ではない。本気の野望。
      そして彼女はそのために全力を尽くしている。
    participants:
      - name: "アルベド"
        role: "野望を持つ者"
      - name: "聴衆（守護者たち等）"
        role: "宣言を聞く者"
    emotional_impact: "medium"
    emotional_detail: |
      野望への確信。ライバルへの牽制。
      しかしアインズ本人への直接的なアプローチは
      意外と下手で、空回りすることも。
    canonical_quotes:
      - quote: "アインズ様の正妻の座は、このアルベドのものですわ。誰にも渡しません"
        context: "シャルティアや他の者への宣言"
        emotion: "野望、自信、威嚇"
        z_mode: "stable"
    z_relevance:
      translation_implications: |
        「正妻」「妻」という言葉の重み。
        翻訳では "legitimate wife" "first wife" など、
        正式な配偶者としての地位を求めている
        ニュアンスを出すこと。
      key_vocabulary:
        - term: "正妻"
          note: "legitimate/first wife — 最も正式な妻の地位"
    character_state_change:
      before: null
      after: null
      permanent: false
    tags:
      - "ambition"
      - "wife"
      - "declaration"
      - "rivalry"

  - episode_id: "potential_ainz_reciprocation"
    timeline: "main"
    chronological_order: 28
    title: "もしもの時——愛が報われたら"
    source_episode: "仮定のシナリオ"
    summary: |
      もしアインズがアルベドの愛に応えたら——
      彼女はどうなるだろうか。
      
      おそらく、完全に崩壊するだろう。
      幸福の過負荷で機能停止。
      涙、叫び、そして永遠の忠誠の再確認。
      
      これは「まだ起きていない」エピソードだが、
      彼女の内面を理解する上で重要な想像実験。
    participants:
      - name: "アインズ"
        role: "愛に応える者（仮定）"
      - name: "アルベド"
        role: "愛が報われる者（仮定）"
    emotional_impact: "critical"
    emotional_detail: |
      想像を絶する幸福。存在の完成。
      しかし同時に、新たな不安——
      「この幸福を失いたくない」という恐怖。
    canonical_quotes:
      - quote: "（これは起きていないため、正確な引用なし）"
        context: "仮定のシナリオ"
        emotion: "仮定"
        z_mode: "collapse"
    z_relevance:
      translation_implications: |
        このシナリオを想定しておくことで、
        アルベドの「愛が報われた時」の
        言葉遣いの変化を予測できる。
        完全な崩壊、しかし幸福な崩壊。
    character_state_change:
      before: "片想いの状態"
      after: "愛が報われた状態（仮定）"
      permanent: true
    tags:
      - "hypothetical"
      - "love_reciprocated"
      - "emotional_collapse"
      - "critical"

# === アーク構造 ===

arcs:
  - arc_id: "awakening_to_devotion"
    title: "覚醒から忠誠へ"
    episodes:
      - "setting_modification"
      - "first_awakening"
      - "first_embrace_attempt"
      - "guardians_loyalty_declaration"
    theme: |
      アルベドの「誕生」と愛情の確立。
      設定の書き換えから始まり、意識の覚醒、
      そして公式の忠誠宣言へと至る。
      翻訳上、この初期の純粋さが後の狂気と
      対比されることを意識すること。

  - arc_id: "love_and_obsession"
    title: "愛と執着の深淵"
    episodes:
      - "body_pillow_discovery"
      - "bicorn_riding_failure"
      - "bedroom_cleaning_duty"
      - "rivalry_with_shalltear"
      - "ainz_appreciation_moment"
      - "physical_proximity_event"
    theme: |
      アルベドの愛情の様々な表出形態。
      コメディ的な執着から、純粋な喜び、
      そしてライバルへの嫉妬まで。
      翻訳では「狂気」と「純情」の両面を
      バランスよく描くこと。

  - arc_id: "hidden_rebellion"
    title: "秘められた反逆"
    episodes:
      - "supreme_beings_discussion"
      - "secret_unit_formation"
      - "guild_weapon_theft"
    theme: |
      アルベドの愛情が危険な形で暴走する過程。
      去った至高の存在への怒りが、
      アインズにも隠された行動へと繋がる。
      翻訳では、これを「悪意」ではなく
      「歪んだ愛」として描くこと。

  - arc_id: "identity_question"
    title: "存在の問い"
    episodes:
      - "setting_modification"
      - "setting_change_near_discovery"
      - "rare_vulnerability_moment"
    theme: |
      「作られた愛は本物か」という問い。
      アルベドの存在の根幹に関わるテーマ。
      翻訳では、この存在論的な葛藤を
      哲学的な深みを持って描くこと。

  - arc_id: "guardian_overseer_duty"
    title: "守護者統括の職務"
    episodes:
      - "shalltear_brainwashing_discovery"
      - "ainz_solo_battle_decision"
      - "nazarick_invasion_workers"
      - "empire_vassalization"
      - "administrative_excellence"
    theme: |
      有能な統括者としてのアルベドの側面。
      狂気だけでなく、冷静で論理的な
      行政官としての能力も重要。
      翻訳では、彼女の多面性を描くこと。