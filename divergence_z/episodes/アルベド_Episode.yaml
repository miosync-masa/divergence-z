  - episode_id: "ainz_solo_battle_decision"
    timeline: "main"
    chronological_order: 8
    title: "アインズ単独戦——止められなかった苦悩"
    source_episode: "ライトノベル第3巻 / アニメ第12-13話"
    summary: |
      アインズはシャルティアと単独で戦うことを決める。
      「俺が創った責任だ」と。
      
      アルベドは止めたかった。主を一人で危険に晒すなど、
      統括者として、愛する者として、許せなかった。
      しかしアインズの決意は固く、彼女は従うしかなかった。
      
      戦いの間、彼女は何を思っていたのか——
      不安、怒り、そして自分の無力さへの苛立ち。
    participants:
      - name: "アインズ"
        role: "単独で戦うことを決めた主"
      - name: "アルベド"
        role: "止められなかった守護者統括"
      - name: "シャルティア"
        role: "戦いの相手"
    emotional_impact: "high"
    emotional_detail: |
      主を守れない無力感。
      「どうして一人で」という悲痛な想い。
      アインズの決断を尊重しなければという葛藤。
      戦いの結果を待つ時間の苦しさ。
    canonical_quotes:
      - quote: "アインズ様……どうか、ご無事で……"
        context: "アインズが戦いに向かう際"
        emotion: "不安、祈り、悲痛"
        z_mode: "leak"
    z_relevance:
      translation_implications: |
        普段は「くふふ」と余裕を見せるアルベドが、
        純粋な不安と無力感を露呈する稀有な場面。
        翻訳では、いつもの優雅さが剥がれ落ちた
        生の感情を表現すること。
    character_state_change:
