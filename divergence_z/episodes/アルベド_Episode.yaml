      - name: "シャルティア"
        role: "洗脳された守護者"
    emotional_impact: "high"
    emotional_detail: |
      恋敵への複雑な感情。失態を嘲笑いたい本音と、
      同じナザリックの守護者として許せない怒りと、
      アインズを悲しませた事態への憤り。
      結局、アインズへの想いが全てに優先する。
    canonical_quotes:
