  - episode_id: "setting_modification"
    timeline: "main"
    chronological_order: 1
    title: "設定の書き換え——作られた愛"
    source_episode: "ライトノベル第1巻 / アニメ第1話"
    summary: |
      ユグドラシルのサービス終了直前、ギルドマスター・モモンガは
      アルベドの設定を確認し、「ビッチ」という一文を見つける。
      「これはひどい」と思ったモモンガは、冗談半分で
      「モモンガを愛している」と書き換えた。
      
      アルベド本人はこの瞬間を知らない。彼女の意識はまだなく、
      ただのゲームデータに過ぎなかった。しかしこの一行の変更が、
      後に彼女の存在の全てを規定することになる。
      
      翻訳上重要なのは、彼女の「愛」が本物かどうかという問いが
      常に作品の底流にあること。彼女自身はこの経緯を知らず、
      自分の愛が純粋なものだと信じている。
    participants:
      - name: "モモンガ（後のアインズ）"
        role: "設定を書き換えた創造主の一人"
      - name: "アルベド"
        role: "書き換えられた対象（意識なし）"
    emotional_impact: "critical"
    emotional_detail: |
      アルベド自身はこの瞬間を経験していない。
      しかし彼女の全存在がこの一瞬に規定された。
      「知らないこと」それ自体が、後の物語における
      巨大な時限爆弾となっている。
    canonical_quotes: []
    z_relevance:
      translation_implications: |
        アルベドの愛情表現を訳す際、常にこの「起源」を意識する必要がある。
        彼女の愛は本物の感情として描かれるが、その根源は人工的なもの。
        このアイロニーを翻訳でも維持すること。
      key_vocabulary:
        - term: "設定"
          note: "ゲーム用語としての「setting」と物語的な「fate/destiny」の二重性"
        - term: "書き換え"
          note: "単なる編集ではなく、存在の改変というニュアンス"
    character_state_change:
      before: "「ビッチ」という設定を持つNPC"
      after: "「モモンガを愛している」という設定を持つNPC"
      permanent: true
    tags:
      - "origin"
      - "identity_core"
      - "hidden_truth"
