      異世界での「軍師」としての才能が開花し始める。
    participants:
      - name: "ヴィンセント・ヴォラキア"
        role: "共闘者、皇帝"
      - name: "帝国軍"
        role: "仲間たち"
    emotional_impact: "high"
    emotional_detail: |
      「何も持っていない」と思っていた自分に、
      戦略を立てる才能があった。
      死に戻りを「予言」として使う——呪いを武器に変える。
    canonical_quotes:
      - quote: "俺は星詠みだ——未来を知っている"
        context: "「星詠み」としての宣言"
        z_mode: "theatrical_confident"
        translation_note: |
          「星詠み」は死に戻りの偽装。
          翻訳時、「予言者」や「fortune teller」など
          文化に合った訳語を検討。
    z_relevance: |
      「死に戻り」の別の活用法の発見。
      翻訳時、「星詠み」という役割名の翻訳に注意。
      単なる「占い師」ではなく、戦略的な意味合いを持つ。
    character_state_change:
      before: "死に戻りは秘密にするしかなかった"
      after: "「予言」として活用する方法を見つけた"
      permanent: "戦略家としての自信"
    tags:
      - "stargazer"
      - "imperial_war"
      - "strategist"
      - "return_by_death_usage"
      - "arc7"

arcs:
  - arc_id: "from_nothing_to_hero"
    title: "何もない少年から英雄へ"
    description: |
      引きこもりだった少年が、異世界で「英雄」として認められるまでの旅路。
      「レムは俺の英雄だ」から「スバルくんは私の英雄です」へ。
      そして「俺はレムの英雄だ」と自分で名乗れるまで。
    episodes_included:
      - "summoning_and_first_encounter"
      - "curse_and_mabeast"
      - "from_zero"
      - "rem_awakening"
    emotional_throughline: |
      「何者でもない」から「誰かの英雄」へ。
      自己否定から自己受容へ。
      しかし常に揺り戻しがある——完全な自信は得られない。
    z_pattern: |
      虚勢（低Z）→ 崩壊（高Z）→ 全肯定による回復（中Z）→ 決意（低〜中Z）
      このサイクルを繰り返しながら、少しずつ底上げされていく。
    translation_implications: |
      「英雄」という語の一貫した翻訳が必須。
      "hero"で統一するか、文脈に応じて"savior"などを使うか、
      早期に決定し全編で維持する。

  - arc_id: "return_by_death_curse"
    title: "死に戻りという呪い"
    description: |
      「やり直せる能力」が「何度も死ぬ呪い」として機能する過程。
      死の恐怖、孤独、そして誰にも言えない苦しみ。
      最終的に「呪い」を「武器」として使いこなすまで。
    episodes_included:
      - "first_death_elsa"
      - "death_loop_breakdown"
      - "echidna_tea_party"
      - "louis_encounter"
      - "imperial_war"
    emotional_throughline: |
      死への恐怖→麻痺→苦しみの蓄積→共有できない孤独→
      苦しみを武器に転換→「星詠み」としての活用。
    z_pattern: |
      死の瞬間は常に高Z。しかし回を重ねるごとに、
      死後の回復が早くなる（慣れと成長）。
      ただし「大切な人の死」は何度経験しても高Zを維持。
    translation_implications: |
      「死に戻り」という用語の翻訳統一が必要。
      "Return by Death"が公式英訳だが、文脈によっては
      意味が伝わりにくい場面もある。
      死の描写は抑制しすぎず、スバルのトラウマを伝える。

  - arc_id: "emilia_relationship"
    title: "エミリアとの関係——執着から愛へ"
    description: |
      一目惚れから始まり、執着と依存を経て、
      対等なパートナーシップへと成長する関係。
      「守る」から「支える」へ。
    episodes_included:
      - "summoning_and_first_encounter"
      - "royal_selection_disgrace"
      - "petelgeuse_defeat"
      - "emilia_first_kiss"
    emotional_throughline: |
      一目惚れ→執着→拒絶→反省→成長→対等な愛
    z_pattern: |
      エミリアとの関係はZの変動が激しい。
      彼女に認められると急落、拒絶されると急上昇。
      最終的に安定した関係になるにつれ、変動幅が小さくなる。
    translation_implications: |
      「エミリアたん」の翻訳は難題。
      "-tan"を残すか、別の親愛表現を使うか。
      公式では"Emilia-tan"が使われることが多い。
      関係の変化に応じて呼称のニュアンスも変わる。

  - arc_id: "identity_journey"
    title: "アイデンティティの旅——「菜月昴」から「ナツキ・スバル」へ"
    description: |
      引きこもりの「菜月昴」が、異世界の「ナツキ・スバル」として
      自己を再定義していく旅路。
      過去との和解、両親への別れ、そして記憶喪失による再検証。
    episodes_included:
      - "first_trial_past"
      - "second_trial_present"
      - "amnesia_subaru"
      - "natsuki_subaru_worth"
    emotional_throughline: |
      過去からの逃避→過去との対面→受容→
      記憶喪失による「外部視点」→自己価値の再発見
    z_pattern: |
      過去との対面は高Z（痛みを伴う）。
      受容の瞬間は中Z（痛みと安堵の混合）。
      記憶喪失期は変動が激しい（アイデンティティの不安定さ）。
    translation_implications: |
      「菜月昴」（漢字）と「ナツキ・スバル」（カタカナ）の
      使い分けに意味がある。
      英語では区別が難しいが、注記で補足することを推奨。
      「行ってきます」などの日本語特有の表現に注意。

  - arc_id: "rem_bond"
    title: "レムとの絆——救いと約束"
    description: |
      殺された相手→英雄と呼んだ相手→英雄と呼ばれた相手→
      記憶を失った相手。レムとの関係は常にスバルの核心。
    episodes_included:
      - "killed_by_rem"
      - "curse_and_mabeast"
      - "rem_who"
      - "from_zero"
      - "rem_awakening"
    emotional_throughline: |
      恐怖→理解→信頼→全肯定→喪失→
      探索→再会→しかし忘れられている
    z_pattern: |
      レムに関連するエピソードは全般的に高Zになりやすい。
      彼女への感謝と負い目が常に混在。
      「彼女に殺された」記憶と「彼女に救われた」記憶の両方が
      常にスバルの中にある。
    translation_implications: |
      「私の英雄です」「俺の英雄だ」の対称性を維持。
      「ゼロから」の翻訳統一。
      レムへの台詞には常に「感謝と負い目」の二重性がある。

relationships_context:
  - character: "エミリア"
    relationship_summary: |
      一目惚れの相手。彼女を守ることが生きる理由だった。
      しかしその「守りたい」は時に彼女の意志を無視する執着になった。
      王選での失態を経て、「守る」から「支える」へと関係が変化。
      現在は恋人として対等に向き合っている。
    key_episodes:
      - "summoning_and_first_encounter"
      - "royal_selection_disgrace"
      - "emilia_first_kiss"
    translation_notes: |
      「エミリアたん」の呼称、「好き」vs「愛してる」の使い分け、
      彼女への台詞のトーン変化（執着→尊重）に注意。

  - character: "レム"
    relationship_summary: |
      最初は自分を殺した相手。しかしその理由を知り、
      彼女を「英雄」と呼んだ。彼女もまたスバルを「英雄」と呼んだ。
      「ゼロから」で救われた恩人。現在は眠りから覚めたが、
      スバルの記憶を失っている。
    key_episodes:
      - "killed_by_rem"
      - "curse_and_mabeast"
      - "from_zero"
      - "rem_awakening"
    translation_notes: |
      「英雄」の翻訳統一。「ゼロから」の翻訳統一。
      彼女への台詞には殺された記憶と救われた記憶の両方がある。

  - character: "ベアトリス"
    relationship_summary: |
      400年孤独だった精霊との契約。
      「死ぬな」と言い、「その人」になると宣言した。
      互いの孤独を理解し合うパートナー。
      虚勢を張らずに素直になれる数少ない相手。
    key_episodes:
      - "beatrice_contract"
    translation_notes: |
      「その人」(sono hito)の翻訳。
      ベアトリスの古風な話し方と、スバルの砕けた話し方の対比。

  - character: "父・菜月賢一"
    relationship_summary: |
      地元の有名人だった父。彼のような存在になりたかった。
      でもなれなかった。その劣等感がスバルを引きこもりにした。
      試練で対面し、ようやく「息子として認められている」と知った。
    key_episodes:
      - "first_trial_past"
      - "second_trial_present"
    translation_notes: |
      「すげぇ息子」などの父の台詞は口語的に。
      父への憧れと劣等感は英語でも表現しにくい微妙なニュアンス。

recurring_themes:
  - theme: "ゼロからの再出発"
    description: |
      「ゼロから」というフレーズは作品の核心。
      失敗しても、忘れられても、何度でもゼロから始める。
      死に戻りはその究極形であり、スバルの精神性そのもの。
    translation_note: '"From zero"を全編で統一。関連表現も一貫性を持たせる。'

  - theme: "英雄の定義"
    description: |
      「何も持たない凡人が英雄になれるか」という問い。
      レムとの「英雄」の呼び合いがその象徴。
      スバルは「英雄になりたい」と願い、
      「英雄だ」と言われることで救われる。
    translation_note: '"hero"の翻訳は重さを維持。軽い"hero"ではない。'

  - theme: "虚勢と本音"
    description: |
      表面的な明るさ（虚勢）と、その奥の弱さ（本音）。
      虚勢が崩壊した時に本当のスバルが見える。
      しかし虚勢もまた「周囲を心配させたくない」という優しさ。
    translation_note: |
      虚勢時は流暢で軽口が多い。崩壊時は途切れ途切れで繰り返しが増える。
      この対比を翻訳でも維持。

  - theme: "記憶と存在"
    description: |
      「存在の消滅」「記憶の喪失」が繰り返されるテーマ。
      覚えていてもらえること、名前を呼んでもらえることの価値。
      スバルの「名前を覚えていてくれ」という願いの切実さ。
    translation_note: |
      「覚えている」「忘れる」「名前を呼ぶ」などの表現に
      通常以上の重みがあることを意識。

notes: |
  スバルの翻訳で最も重要なのは「表面と内面の乖離」の表現。
  軽口を叩いている時でも、その裏には無数の死の記憶がある。
  翻訳者は常に「このスバルは何を経験してきたか」を意識する必要がある。
  
  エピソード数が膨大な作品のため、ここに記載されていないエピソードも多い。
  特にArc7以降は進行中のため、今後追加が必要。
  
  死に戻りの回数は正確にカウントされていないが、
  公式では数十回〜百回以上と推定されている。
  その全てがスバルの記憶に残っていることを忘れてはならない。