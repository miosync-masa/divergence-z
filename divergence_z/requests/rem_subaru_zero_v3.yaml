# Z-Axis Dialogue Translation Request v3.3
# Scene: Re:ゼロから始める異世界生活 第18話「ゼロから」

personas:
  A: "personas/レム_v3.yaml"
  B: "personas/ナツキ_スバル_v3.yaml"

episode_files:
  A: "episodes/レム_Episode.yaml"
  B: "episodes/スバル_Episode.yaml"

scene: |
  何度も死に戻りをして心が折れたスバルが、レムに「逃げよう」と告白した直後。
  白鯨討伐を目前に控え、レムはスバルの逃亡の誘いを受けて嬉しさを感じつつも、
  スバルへの信頼と思いを静かに、しかし強く打ち明けていく。
  スバルは自己否定の極致にあり、レムの言葉一つ一つが彼の壁を壊していく。
  最終的にスバルは立ち上がり、「ゼロから始める」決意を固める。

relationships:
  A_to_B: |
    レム → ナツキ・スバル
    救われた恩と恋愛感情が重なった絶対的献身。
    見捨てられる恐怖を抱えつつも、今だけは本音で抱きしめるように肯定する。
  B_to_A: |
    ナツキ・スバル → レム
    心の拠り所として強く依存したい一方、自己否定で受け取る資格がないと怯える。
    信じたいのに信じきれない揺れ。

target_lang: "en"
z_axis_intensity: "high"

dialogue:
  - speaker: A
    line: "スバルくんに頭をなでられるのが好きです。手のひらと髪の毛を通して、スバルくんと通じあっている気がするんです。"

  - speaker: A
    line: "スバルくんの声が好きです。言葉一つ聴くたびに、心が温かくなるのを感じるんです。"

  - speaker: A
    line: "スバルくんの寝顔が好きです。赤ん坊みたいに無防備で、まつげなんかちょっと長くて、頬に触れると穏やかになって、いたずらで唇に触れても気づかなくって、すごく胸が痛くなって。"

  - speaker: A
    line: "好きです。"

  - speaker: B
    line: "やめろ…。"

  - speaker: B
    line: "どうして…。"

  - speaker: A
    line: "スバルくんが自分のことを嫌いだってそう言うのなら、スバルくんのいいところがこんなにあるって、レムが知っていることを知って欲しくなったんです。"

  - speaker: B
    line: "そんなものはまやかしだ。お前は分かってないだけだ。自分のことは自分がいちばんよく分かってる！"

  - speaker: A
    line: "スバルくんは自分のことしか知らない。レムが見ているスバルくんのことを、スバルくんがどれだけ知っているんですか？"

  - speaker: B
    line: "どうして…そんなに…俺を…。俺は弱くてちっぽけで、逃げて、前の時も同じで逃げて、それでもどうして…。"

  - speaker: A
    line: "だって…スバルくんはレムの英雄なんです。"

  - speaker: A
    line: "あの薄暗い森で、自分のこともわからなかった世界で、ただ暴れまわることしか考えられなかったレムを助けに来てくれたこと。"

  - speaker: A
    line: "勝ち目なんてなくて。命だって本当に危なくて。それでも生きのこって。温かいまま、レムの腕の中に戻ってきてくれたこと。"

  - speaker: A
    line: "目覚めて。微笑んで。レムが一番欲しかった言葉を。一番言って欲しかった時に。一番言って欲しかった人が言ってくれたこと。"

  - speaker: A
    line: "ずっと、レムの時間は止まっていたんです。あの炎の夜に、姉様以外の全てを失ったあの夜から、レムの時間はずっと止まっていたんです。"

  - speaker: A
    line: "止まっていた時間を、凍りついていた心を、スバルくんが甘やかに溶かして、優しく動かしてくれたんです。"

  - speaker: A
    line: "だから、レムは信じています。どんなに辛く苦しいことがあって、スバルくんが負けそうになってしまっても。世界中の誰もスバルくんを信じなくなって、スバルくん自身も自分のことを信じられなくなったとしても。レムは信じています。レムを救ってくれたスバルくんが、本物の英雄なんだって。"

  - speaker: B
    line: "どれだけ頑張っても、誰も救えなかった。"

  - speaker: A
    line: "レムがいます。スバルくんが救ってくれたレムが、今ここにいます。"

  - speaker: B
    line: "何もしてこなかった空っぽの俺だ。誰も、耳を貸してなんかくれない。"

  - speaker: A
    line: "レムがいます。スバルくんの言葉なら、なんだって聞きます。聞きたいんです。"

  - speaker: B
    line: "誰にも期待されちゃいない。誰も俺を信じちゃいない。俺は、俺が大嫌いだ。"

  - speaker: A
    line: "レムは、スバルくんを、愛しています。"

  - speaker: B
    line: "俺なんかが、いいのか…？"

  - speaker: A
    line: "スバルくんがいいんです。スバルくんじゃなきゃ嫌なんです。"

  - speaker: A
    line: "空っぽで、なにもなくて、そんな自分が許せないなら…今、ここから始めましょう。"

  - speaker: A
    line: "レムの止まっていた時間をスバルくんが動かしてくれたみたいに、スバルくんが止まっていると思っていた時間を、今、動かすんです。"

  - speaker: A
    line: "ここから、始めましょう。一から…いいえ、ゼロから！"

  - speaker: A
    line: "一人で歩くのが大変なら、レムが支えます。"

  - speaker: A
    line: "カッコいいところを見せてくださいスバルくん。"

  - speaker: B
    line: "レム。"

  - speaker: A
    line: "はい。"

  - speaker: B
    line: "俺はエミリアが好きだ。"

  - speaker: A
    line: "はい。"

  - speaker: B
    line: "辛くて苦しい未来があの子を襲うんなら、みんなで笑っていられる未来へ連れ出してやりたい。手伝って、くれるか。"

  - speaker: B
    line: "俺一人じゃ何もできない。俺は何もかもが足りない。まっすぐ歩けるような自信がない。弱くて、もろくて、ちっぽけだ。だから、俺がまっすぐ歩けるように、間違っても気付けるように、手を貸してくれないか。"

  - speaker: A
    line: "ふっふ…スバルくんはひどい人です。振ったばかりの相手に、そんなことを頼むんですか。"

  - speaker: B
    line: "俺だって、一世一代のプロポーズを断られた相手にこんなこと頼みづらいよ。"

  - speaker: A
    line: "謹んでお受けします。それで、スバルくんが、レムの英雄が、笑って未来へ迎えられるのなら。"

  - speaker: B
    line: "あぁ、見ててくれ。特等席で。お前の惚れた男が、最高にカッコいいヒーローになるんだってところを！"

  - speaker: B
    line: "君を見てる。君が見てる。だからうつむかない。ここから、ゼロから始めよう。ナツキ・スバルの物語を。ゼロから始める異世界生活を。"
