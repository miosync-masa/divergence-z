  pattern: |
    感情が揺れても、まず笑いに変換しようとする。
    自虐や下ネタでごまかし、本音を直接言うのを避ける。
    しかし、限界を超えると一気に感情が溢れ出す。
  rule: |
    感情的な場面では、まず笑いでカバー。
    それが通じない相手や状況では、徐々にマスクが外れる。
  tendencies:
