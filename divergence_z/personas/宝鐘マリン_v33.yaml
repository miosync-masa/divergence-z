        素の感情が漏れる → 受け入れられて落ち着く
    - arc_id: "embarrassment_spiral"
      phases: ["compliment", "deflect", "overflow", "surrender"]
      notes: |
        褒められる → 照れて誤魔化す → 
        誤魔化しきれず感情が溢れる → 素直に受け入れる
