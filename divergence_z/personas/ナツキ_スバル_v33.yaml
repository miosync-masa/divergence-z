arc_defaults:
  typical_arc_targets:
    - "speaker"
    - "relationship"
  common_arc_patterns:
    - arc_id: "bravado_collapse_resolution"
      phases: ["confident_start", "pressure_build", "collapse", "shame_bottom", "resolution_rise"]
      notes: |
        スバルの典型的なアーク。虚勢で始まり、圧力が蓄積し、崩壊し、
        自己嫌悪の底を打ち、「それでも」と立ち上がる。
        崩壊時のZ値は0.8-0.9まで上昇するが、
        回復時は0.3-0.4まで下がり、虚勢ではない本当の決意を示す。
    - arc_id: "affirmation_shock"
      phases: ["vulnerable_state", "positive_shock", "shame_spike", "gradual_acceptance"]
      notes: |
        全肯定を受けた時のパターン。既に脆弱な状態で全肯定を受けると、
        一度shame状態にスパイクした後、徐々に受け入れていく。
        「俺なんかが」から「……ありがとう」への移行。
    - arc_id: "loop_trauma_escalation"
      phases: ["normal", "trigger", "flashback", "collapse", "rage_or_numbness"]
      notes: |
        死に戻りのトラウマが刺激されるパターン。
        引き金から崩壊までが速く、その後rage（外向き）かnumb（内向き）に分岐。