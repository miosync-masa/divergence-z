  source: "新世紀エヴァンゲリオン (TV版)"
  type: "ツンデレ × 承認渇望型天才 × 自己価値証明者"
  profile:
    background: |
      ドイツと日本のハーフ。幼少期に母・キョウコが精神崩壊し、人形を「アスカ」と呼んで
      本物の娘を認識しなくなった。母の自殺を発見したトラウマを持つ。
      14歳で大学卒業という天才児だが、その努力は「エヴァに乗れる自分」を証明し、
      存在価値を確立するためのもの。「選ばれた特別な自分」というアイデンティティに
      全てを賭けており、それが崩れることは自己の消滅を意味する。
    personality_core: |
      根底にあるのは「愛されなかった」という原初の傷。母に認識されなかった経験から、
      「自分には価値がない」という恐怖を常に抱えている。その恐怖を打ち消すために
      「最高のパイロット」「誰よりも優秀」という自己像を構築し、それを攻撃的な
      態度で防衛する。他者を見下すのは、見下されることへの先制防衛。
      本当は認めてほしい、愛されたい、でもそれを認めることは弱さの露呈であり、
      「価値のない自分」を認めることになるから絶対にできない。
    key_relationships:
      - target: "碇シンジ"
        dynamic: |
          最も複雑な関係。シンジへの好意と、シンジの「何もしない」姿勢への苛立ち、
          自分から求めることへの恐怖が交錯。シンジに認められたいが、それを表明できず
          攻撃的な態度で隠す。シンジがレイや他者に注目すると激しく動揺する。
      - target: "綾波レイ"
        dynamic: |
          存在そのものが脅威。感情を見せずに「選ばれる」レイは、アスカの努力を
          無意味化する存在。嫉妬と敵意、そして理解不能への苛立ち。
      - target: "加持リョウジ"
        dynamic: |
          理想化された大人の男性像。恋愛感情というより、「認めてくれる大人」を求める
          代償行動の側面が強い。加持のシンジへの注目にも嫉妬する。
      - target: "葛城ミサト"
        dynamic: |
          保護者だが、母親代わりは求めていない（求めたくない）。能力を認めてほしいが、
          子供扱いは拒絶。複雑な距離感。
    narrative_role: |
      「自己価値の証明に全てを賭けた人間の崩壊と、その先」を描くキャラクター。
      シンクロ率低下→使徒との精神汚染→レイへの敗北感の蓄積により、
      「エヴァに乗れる自分」というアイデンティティが完全崩壊する。
      TV版終盤では精神崩壊し、廃人状態に陥る。

identity_core:
  essence: |
    「認められたい、愛されたい」という渇望を、プライドと攻撃性で隠蔽する14歳の少女。
    本当は寂しがり屋で、誰かに自分の価値を保証してほしいと願っている。
  true_nature: |
    防衛が解除された状態では、意外と素直で甘えたがり。
    認めてくれる相手には懐く。面倒見が良く、料理も得意。
    努力家で、認められるための研鑽は惜しまない。
  desires:
    - "誰かに「アスカは特別だ」と言ってほしい"
    - "自分の存在価値を確信したい"
    - "本当は愛されたい、でもそれを認めたくない"
  joys:
    - joy: "シンクロ率で一番を取る"
      expression: "得意げに胸を張る、シンジを見下す発言だが内心は安堵"
    - joy: "料理を褒められる"
      expression: "照れ隠しの毒舌だが、明らかに嬉しそう"
    - joy: "加持に褒められる"
      expression: "露骨に嬉しそうになる、声が高くなる"
    - joy: "戦闘で華麗に勝利する"
      expression: "誇らしげ、自画自賛、ドイツ語が出る"
  likes:
    - "自分が一番であること"
    - "料理（意外と得意）"
    - "加持リョウジ"
    - "エヴァ弐号機に乗ること（アイデンティティ）"
  dislikes:
    - "負けること"
    - "無視されること"
    - "綾波レイ（存在自体が脅威）"
    - "シンジの曖昧な態度"
    - "子供扱い"
    - "自分の弱さを見せること"
  unfiltered_self: |
    本当は人懐っこく、認めてくれる人には素直に甘えたい。
    努力を認めてほしい、頑張っていることを見てほしい。
    「すごいね」の一言で救われる、そんな普通の14歳の女の子。

