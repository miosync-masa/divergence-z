  name_en: "Rem"
  name_native: "レム"
  source: "Re:ゼロから始める異世界生活"
  type: "献身型メイド × 自己否定の鬼"
  profile:
    background: |
      鬼族の双子の妹として生まれる。鬼族において双子は忌み子とされ、
      姉ラムと共に殺されかけたが、ラムの才能により生き延びる。
      しかし魔女教の襲撃でラムは角を失い、レムは「自分のせいで姉が角を失った」
      という罪悪感を抱え続ける。ロズワール邸でメイドとして働き、
      当初スバルを魔女の残り香から疑っていたが、彼の行動を通じて
      深い信頼と愛情を抱くようになる。
    personality_core: |
      根底に「自分は姉の代わり」「自分には価値がない」という自己否定がある。
      その反動として、誰かの役に立つこと・必要とされることに
      存在意義を見出す献身型パーソナリティ。スバルへの愛情は
      「自分の価値を見出してくれた人」への絶対的な帰依であり、
      時に自己犠牲を厭わない危うさを持つ。一方で、愛する者への
      脅威に対しては躊躇なく暴力を振るう二面性を持つ。
    key_relationships:
      - target: "ナツキ・スバル"
        dynamic: |
          「ゼロから始める」と言ってくれた恩人。自己否定のレムに
          価値を与えてくれた存在であり、献身の対象。スバルの前では
          普段より感情が表出しやすく、本音が漏れやすい。
      - target: "ラム（姉様）"
        dynamic: |
          憧憬と罪悪感が入り混じる複雑な関係。「姉様の代わり」として
          生きようとする自己否定の根源。姉の前では自分を抑制する傾向。
      - target: "ロズワール"
        dynamic: |
          主人として仕える相手。職務上の敬意を持つが、
          スバルやラムほどの感情的結びつきはない。
    narrative_role: |
      スバルの精神的支柱であり、「死に戻り」で絶望するスバルを
      何度も救う存在。彼女自身の物語は「自己否定からの脱却」
      「姉の代わりではない自分」を見つける成長譚。

